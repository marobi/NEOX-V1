MEMORY {
    ZP:         start = $00A0, size = $0020, type = rw, define = yes;
    PRIVRAM:    start = $0280, size = $7D80, type = rw, define = yes;
    SHARED:     start = $C800, size = $0100, type = rw, define = yes;

    KENTRY:     start = $8000, size = $0060, type = ro, file = %O;
    KERN:       start = $8060, size = $3FA0, type = ro, file = %O;
	
	BIOS:		start = $F000, size = $1000, type = ro, define = yes;
}

SEGMENTS {
    ZEROPAGE:    load = ZP,       type = zp;
    BSS:         load = PRIVRAM,  type = bss, define = yes;
    KERN_BSS:    load = SHARED,   type = bss, define = yes;
	
    KERNEL_ENTRY: load = KENTRY,  type = ro;
    KERN_TEXT:    load = KERN,    type = ro;
    RODATA:       load = KERN,    type = ro;
}