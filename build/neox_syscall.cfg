MEMORY {
    ZP:         start = $0080, size = $0080, type = rw, define = yes;

    PRIVRAM:    start = $0280, size = $7D80, type = rw, define = yes;
    SHARED:     start = $8000, size = $0080, type = rw, define = yes;

    SYSCALL:    start = $C000, size = $1000, type = ro, file = %O;
}

SEGMENTS {
    ZEROPAGE:       load = ZP,       type = zp;

    BSS:            load = PRIVRAM,  type = bss, define = yes;
    KERN_BSS:       load = SHARED,   type = bss, define = yes;

    SYSCALL_STUBS:  load = SYSCALL,  type = ro, start = $C000;
    KERN_TEXT:      load = SYSCALL,  type = ro;
    RODATA:         load = SYSCALL,  type = ro;
}