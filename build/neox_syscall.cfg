MEMORY {
    ZP:      start = $00A0, size = $0020, type = rw, define = yes;
    PRIVRAM: start = $0280, size = $1D80, type = rw, define = yes;
    SHARED:  start = $B020, size = $0FE0, type = rw, define = yes;
    SYSCALL: start = $F100, size = $0100, type = ro, file = %O;
}

SEGMENTS {
    ZEROPAGE:      load = ZP,      type = zp;
    BSS:           load = PRIVRAM, type = bss, define = yes;
    KERN_BSS:      load = SHARED,  type = bss, define = yes;
    SYSCALL_STUBS: load = SYSCALL, type = ro;
    KERN_TEXT:     load = SYSCALL, type = ro;
    RODATA:        load = SYSCALL, type = ro;
}
