MEMORY {
    # File-backed resident user image and writable static storage.
    USER_IMAGE: start = $1000, size = $6C00, type = rw, file = %O, define = yes;

    # Process-private cc65 software stack used from Build 130 onward.
    C_STACK:    start = $7C00, size = $0400, type = rw, file = "", define = yes;

    # Process-private cc65/libneox zero-page runtime variables.
    C_ZP:       start = $0020, size = $0060, type = rw, file = "", define = yes;
}

SEGMENTS {
    USER_ENTRY: load = USER_IMAGE, type = ro;
    USER_TEXT:  load = USER_IMAGE, type = ro;
    USER_DATA:  load = USER_IMAGE, type = rw;

    C_CODE:     load = USER_IMAGE, type = ro,  optional = yes;
    C_RODATA:   load = USER_IMAGE, type = ro,  optional = yes;
    C_DATA:     load = USER_IMAGE, type = rw,  optional = yes;
    C_BSS:      load = USER_IMAGE, type = bss, define = yes;
    C_ZEROPAGE: load = C_ZP,       type = zp,  optional = yes;
    C_STACK:    load = C_STACK,    type = bss, optional = yes, define = yes;
}
