# NEOX external cc65/ld65 target configuration.
MEMORY {
    # File-backed resident user image and writable static storage.
    USER_IMAGE: start = $1000, size = $6C00, type = rw, file = %O, define = yes;

    # Process-private cc65 software stack used from Build 130 onward.
    C_STACK:    start = $7C00, size = $0400, type = rw, file = "", define = yes;

    # Process-private cc65/libneox zero-page runtime variables.
    C_ZP:       start = $0020, size = $0060, type = rw, file = "", define = yes;
}

SEGMENTS {
    USER_ENTRY: load = USER_IMAGE, type = ro;
    USER_TEXT:  load = USER_IMAGE, type = ro;
    USER_DATA:  load = USER_IMAGE, type = rw;

    # All file-backed segments must precede all BSS segments. ld65 omits BSS
    # bytes from the raw output file. Placing CODE after C_BSS would therefore
    # shift the runtime code downward in neox_user.bin while relocations still
    # target the higher run addresses.
    #
    # NEOX-named file-backed segments emitted by project C compilation.
    C_CODE:     load = USER_IMAGE, type = ro,  optional = yes;
    C_RODATA:   load = USER_IMAGE, type = ro,  optional = yes;
    C_DATA:     load = USER_IMAGE, type = rw,  optional = yes;

    # Standard cc65 file-backed runtime segments.
    STARTUP:    load = USER_IMAGE, type = ro,  optional = yes;
    LOWCODE:    load = USER_IMAGE, type = ro,  optional = yes;
    ONCE:       load = USER_IMAGE, type = ro,  optional = yes;
    CODE:       load = USER_IMAGE, type = ro,  optional = yes;
    RODATA:     load = USER_IMAGE, type = ro,  optional = yes;
    DATA:       load = USER_IMAGE, type = rw,  optional = yes;

    # Zero-page segments are process-private and not emitted in the image.
    C_ZEROPAGE: load = C_ZP,       type = zp,  optional = yes;
    ZEROPAGE:   load = C_ZP,       type = zp,  optional = yes;

    # All ordinary BSS segments are deliberately last in USER_IMAGE so no
    # file-backed segment follows an omitted region.
    C_BSS:      load = USER_IMAGE, type = bss, define = yes;
    BSS:        load = USER_IMAGE, type = bss, optional = yes;

    C_STACK:    load = C_STACK,    type = bss, optional = yes, define = yes;
}
